server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # SPA: any non-file route falls back to index.html for react-router to handle.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API + health calls to the server container so the dashboard can use
    # relative paths in production exactly as it does in Vite's dev-server proxy.
    location /api/ {
        proxy_pass http://server:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /healthz {
        proxy_pass http://server:8080/healthz;
    }
}
