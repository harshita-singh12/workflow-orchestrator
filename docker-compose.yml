services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orchestrator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orchestrator}
      POSTGRES_DB: ${POSTGRES_DB:-orchestrator}
    ports:
      # Host-side port only; the server always talks to `postgres:5432` inside the compose
      # network. Mapped to 5433 on the host in case something else on your machine already
      # occupies the default 5432.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orchestrator}"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379" # host-side only; see the postgres port comment above
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-orchestrator}:${POSTGRES_PASSWORD:-orchestrator}@postgres:5432/${POSTGRES_DB:-orchestrator}?sslmode=disable
      REDIS_ADDR: redis:6379
      HTTP_ADDR: :8080
      GRPC_ADDR: :9090
      NODE_ID: server-1
      ENABLE_SHARDING: "false"
      LEASE_DURATION_SECONDS: "30"
      # Shared secret required as `Authorization: Bearer <key>` on the HTTP API (except
      # /healthz) and as gRPC metadata on the worker API. This default is only safe because
      # this whole stack is meant for local/dev use — change it via a real .env file (or your
      # deployment's secrets mechanism) before running this anywhere reachable by anyone else.
      WORKFLOW_API_KEY: ${WORKFLOW_API_KEY:-dev-local-key-change-me}
      # Must match the dashboard's own origin (the `frontend` service's host port below) —
      # see internal/httpapi's CORS middleware.
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3002}
    ports:
      - "8080:8080"
      - "9091:9090" # host-side 9091 to dodge common local port-9090 conflicts (e.g. Prometheus)
    healthcheck:
      # The runtime image is distroless (no shell/wget/curl); the binary answers its own
      # healthcheck instead — see the `server healthcheck` branch in cmd/server/main.go.
      test: ["CMD", "/server", "healthcheck"]
      interval: 3s
      timeout: 3s
      retries: 20

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    environment:
      SERVER_GRPC_ADDR: server:9090
      REDIS_ADDR: redis:6379
      # WORKER_ID is intentionally unset: internal/config falls back to
      # "<hostname>-<pid>", and each replica gets a distinct container hostname, which is
      # what keeps them from colliding in the worker registry / lease-owner bookkeeping.
      WORKER_CONCURRENCY: "4"
      # Must match the server's WORKFLOW_API_KEY above — sent as gRPC metadata on every call.
      WORKFLOW_API_KEY: ${WORKFLOW_API_KEY:-dev-local-key-change-me}
    deploy:
      replicas: 2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the built JS bundle at build time (Vite only exposes VITE_-prefixed
        # vars to client code) so the dashboard can send the same key the server expects.
        # Must match WORKFLOW_API_KEY above.
        VITE_API_KEY: ${WORKFLOW_API_KEY:-dev-local-key-change-me}
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "3002:80"
    healthcheck:
      # 127.0.0.1, not localhost: this image's nginx only listens on IPv4, and "localhost"
      # resolving to ::1 first inside the container made wget fail with connection refused.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
